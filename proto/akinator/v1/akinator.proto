syntax = "proto3";

package akinator.v1;

option go_package = "github.com/raveesh/ai-akinator/gen/akinator/v1;akinatorv1";

// Answer is what the user replies to a question.
enum Answer {
  ANSWER_UNSPECIFIED = 0;
  ANSWER_YES = 1;
  ANSWER_NO = 2;
  ANSWER_MAYBE = 3;
  ANSWER_DONT_KNOW = 4;
}

// Candidate is a player ranked by current posterior probability.
message Candidate {
  string player_id = 1;
  string name = 2;
  double probability = 3;
}

// Question is what the engine asks next.
message Question {
  string question_id = 1; // stable id of underlying feature/heuristic
  string text = 2;        // natural-language phrasing (LLM-shaped)
}

// FinalGuess is emitted when confidence >= 0.80 or after the last allowed question.
message FinalGuess {
  string player_id = 1;
  string name = 2;
  double confidence = 3;
}

message StartGameRequest {}
message StartGameResponse {
  string session_id = 1;
  Question question = 2;
  int32 questions_remaining = 3;
}

message AnswerQuestionRequest {
  string session_id = 1;
  string question_id = 2;
  Answer answer = 3;
}
message AnswerQuestionResponse {
  // Either next_question is set, or final_guess is set.
  Question next_question = 1;
  FinalGuess final_guess = 2;
  int32 questions_remaining = 3;
  repeated Candidate top_candidates = 4; // for debug/UI
}

message SubmitFeedbackRequest {
  string session_id = 1;
  bool guess_was_correct = 2;
  string actual_player_id = 3; // optional, set when guess was wrong
}
message SubmitFeedbackResponse {}

service AkinatorService {
  rpc StartGame(StartGameRequest) returns (StartGameResponse);
  rpc AnswerQuestion(AnswerQuestionRequest) returns (AnswerQuestionResponse);
  rpc SubmitFeedback(SubmitFeedbackRequest) returns (SubmitFeedbackResponse);
}
